name: 每日14点大宗商品股指推送
on:
  schedule:
    # UTC06:00 = 北京时间14:00，周一至周五执行
    - cron: "0 6 * * 1-5"
  # 增加手动测试按钮，方便调试
  workflow_dispatch:
jobs:
  push_task:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
      - name: 安装Python依赖requests
        run: pip install requests
      - name: 执行行情自动推送脚本
        run: python nq_push.py